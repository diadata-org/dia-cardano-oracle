# Feeder infrastructure config — Cardano Mainnet ↔ DIA Mainnet.
# Loaded automatically when CARDANO_NETWORK=Mainnet.
#
# Priority rule: YAML values win over env-var equivalents when both are
# present, EXCEPT for secrets (wallet seeds, Blockfrost keys) which live
# exclusively in .env and are never placed in this file.
#
# See infrastructure.preview.yaml for full field-level documentation.
# Only values that differ from Preview are annotated here.

infrastructure:

  # --------------------------------------------------------------------------
  # database
  # --------------------------------------------------------------------------
  database:
    # Overrideable via DATABASE_DRIVER env var.
    driver: sqlite
    # Overrideable via DATABASE_PATH_MAINNET env var.
    path: state/mainnet/feeder.sqlite

  # --------------------------------------------------------------------------
  # source — DIA Mainnet (chain_id 1050).
  # --------------------------------------------------------------------------
  source:
    chain_id: 1050
    name: DIA Mainnet
    # rpc_urls: tried in order; failover on any request error.
    rpc_urls:
      - https://rpc.diadata.org
    # ws_url: DIA_WS_CREDENTIAL_MAINNET from .env is appended automatically.
    ws_url: wss://rpc.diadata.org
    # start_block: set to a recent block to avoid replaying all of mainnet
    #   history on first run. 0 = scan from the very first block.
    start_block: 0

  # --------------------------------------------------------------------------
  # event_monitor — WebSocket reconnection policy.
  # --------------------------------------------------------------------------
  event_monitor:
    enabled: true
    reconnect_interval: 5s
    max_reconnect_attempts: 60

  # --------------------------------------------------------------------------
  # block_scanner — HTTP polling knobs.
  # --------------------------------------------------------------------------
  block_scanner:
    enabled: true
    scan_interval: 10s
    block_range: 500
    confirmations: 6
    max_block_gap: 5000        # gap detection before backward sync. Deferred to M3.
    backward_sync: true        # backfill missed block ranges after reconnect. Deferred to M3.

  # --------------------------------------------------------------------------
  # event_processor — dedup cache + lane coalescing.
  # --------------------------------------------------------------------------
  event_processor:
    dedup_cache_size: 4096
    dedup_cache_ttl: 1h
    coalesce_window: 2s
    max_intent_age: 15m
    max_batch_size: 10
    size_fallback_enabled: true
    # ---- M3 placeholders — Spectra parity (parallel event enrichment).
    # enable_parallel_mode: false
    # parallel_worker_count: 4
    # parallel_queue_size: 256
    # parallel_timeout: 30s

  # --------------------------------------------------------------------------
  # worker_pool — submission queue knobs.
  # See infrastructure.preview.yaml for the Cardano-vs-Spectra divergence
  # note (lane model instead of worker pool). `max_workers` and
  # `task_queue_size` are intentionally omitted.
  # --------------------------------------------------------------------------
  worker_pool:
    # task_timeout: M3 — Spectra parity. Not read by this feeder.
    # task_timeout: 60s
    retry_delay: 5s
    max_retries: 3
    # inflight_timeout_ms: how long a submitted tx remains in the in-flight
    #   table (blocking new submissions on the same receiver UTxO) before
    #   the lock is considered stuck and released. Required — validator
    #   rejects load if missing. Unit: milliseconds.
    inflight_timeout_ms: 900000  # 15 min

  # --------------------------------------------------------------------------
  # health_check — /health/ready probe.
  # --------------------------------------------------------------------------
  health_check:
    enabled: true
    check_interval: 30s        # ticker cadence — informational in M2 until ticker probe lands (M3).
    max_processing_lag: 5m     # /health/ready returns 503 if exceeded. Cardano-feeder extension.

  # --------------------------------------------------------------------------
  # api — HTTP server.
  # --------------------------------------------------------------------------
  api:
    enabled: true
    host: 0.0.0.0
    port: 8080
    enable_cors: false
    readiness:
      max_last_confirmed_age: 15m

  # --------------------------------------------------------------------------
  # metrics — Prometheus.
  # --------------------------------------------------------------------------
  metrics:
    # Overrideable via METRICS_ENABLED / METRICS_NAMESPACE env vars.
    enabled: true
    namespace: dia_bridge

  # --------------------------------------------------------------------------
  # cardano — destination-chain confirmation policy.
  # --------------------------------------------------------------------------
  cardano:
    # confirmation_depth: Cardano blocks waited past inclusion before
    #   the feeder emits `tx_confirmed`. 1 = practically final. Higher
    #   values trade latency for rollback safety.
    confirmation_depth: 1

  # --------------------------------------------------------------------------
  # cron_service — Spectra parity. Periodic re-submission for cron-enabled
  # destinations whose on-chain pair has gone stale beyond `time_threshold`.
  # See infrastructure.preview.yaml for the full notes.
  # --------------------------------------------------------------------------
  cron_service:
    enabled: true
    tick_interval: 30s

  # --------------------------------------------------------------------------
  # alerting — canonical thresholds for feeder warnings + Prometheus rules.
  # See infrastructure.preview.yaml for the full unit / semantic notes.
  # alerts.yml mirrors these values; both must stay in sync.
  # --------------------------------------------------------------------------
  alerting:
    receiver_balance_low_lovelace: 2000000000          # 2 ADA — top-up needed
    settle_overdue_lovelace: 10000000                  # 10 ADA accrued — run settle
    payment_hook_withdraw_ready_lovelace: 50000000     # 50 ADA — DIA can withdraw
    admin_wallet_low_lovelace: 5000000000              # 5 ADA — refill operator wallet
    oracle_pair_stale_seconds: 3600                    # 1 h since last confirm
    price_deviation_high_percent: 5                    # 5 % p95 → misreport suspect
    price_age_high_seconds: 600                        # 10 min p95 → DIA source stale

  # --------------------------------------------------------------------------
  # dry_run — any of YAML/--dry-run/DRY_RUN=true activates it.
  # --------------------------------------------------------------------------
  dry_run: false
